<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Stock Analysis</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-box { background: #fff; border-radius: 12px; padding: 40px; width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .login-box h2 { text-align: center; color: #333; margin-bottom: 30px; font-size: 24px; }
        .login-box h2 i { color: #667eea; margin-right: 8px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: #666; font-size: 14px; margin-bottom: 6px; }
        .form-group input { width: 100%; height: 44px; padding: 0 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 15px; transition: border-color 0.3s; }
        .form-group input:focus { outline: none; border-color: #667eea; }
        .error-msg { color: #e74c3c; font-size: 13px; margin-bottom: 15px; text-align: center; }
        .btn-login { width: 100%; height: 46px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; transition: opacity 0.3s; }
        .btn-login:hover { opacity: 0.9; }
        .footer { text-align: center; margin-top: 20px; color: #999; font-size: 12px; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <div class="login-box">
        <h2><i class="fa fa-bar-chart"></i> Stock Analysis</h2>
        {% if error %}
        <div class="error-msg"><i class="fa fa-exclamation-circle"></i> {{ error }}</div>
        {% end %}
        <form method="POST" action="/login">
            <input type="hidden" name="next" value="{{ next_url }}" />
            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" placeholder="请输入用户名" autofocus required />
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" placeholder="请输入密码" required />
            </div>
            <button type="submit" class="btn-login">登 录</button>
        </form>
        <div class="footer">Stock Analysis System v2.0</div>
    </div>
</body>
</html>
