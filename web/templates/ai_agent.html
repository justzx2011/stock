{% extends "layout/default.html" %}

{% block main_content %}

<style>
.chat-container { display: flex; flex-direction: column; height: calc(100vh - 180px); }
.chat-messages { flex: 1; overflow-y: auto; padding: 15px; background: #f5f5f5; border-radius: 4px; margin-bottom: 10px; }
.msg-row { margin-bottom: 12px; display: flex; align-items: flex-start; }
.msg-row.user { justify-content: flex-end; }
.msg-row.ai { justify-content: flex-start; }
.msg-bubble { max-width: 85%; padding: 10px 14px; border-radius: 8px; font-size: 13px; line-height: 1.6; word-wrap: break-word; }
.msg-bubble.user-bubble { background: #438eb9; color: #fff; border-bottom-right-radius: 2px; }
.msg-bubble.ai-bubble { background: #fff; border: 1px solid #ddd; border-bottom-left-radius: 2px; }
.msg-bubble pre { background: #2d2d2d; color: #f8f8f2; padding: 8px 12px; border-radius: 4px; overflow-x: auto; font-size: 12px; margin: 6px 0; }
.msg-bubble table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 12px; }
.msg-bubble table th, .msg-bubble table td { border: 1px solid #ddd; padding: 4px 8px; text-align: left; }
.msg-bubble table th { background: #438eb9; color: #fff; }
.msg-bubble table tr:nth-child(even) { background: #f9f9f9; }
.chat-input-bar { display: flex; gap: 8px; }
.chat-input-bar input { flex: 1; height: 40px; padding: 0 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
.chat-input-bar button { height: 40px; padding: 0 20px; }
.quick-tags { margin-bottom: 10px; }
.quick-tags .btn { margin-right: 5px; margin-bottom: 5px; }
.settings-panel { background: #fff; border: 1px solid #ddd; border-radius: 4px; padding: 15px; margin-bottom: 10px; display: none; }
.settings-panel.active { display: block; }
.settings-panel .form-group { margin-bottom: 8px; }
.settings-panel label { width: 80px; display: inline-block; }
.settings-panel input { width: 300px; height: 32px; padding: 0 8px; border: 1px solid #ccc; border-radius: 3px; }
.typing-indicator { color: #999; font-style: italic; padding: 5px 0; }
.data-table-wrapper { max-height: 300px; overflow: auto; margin: 8px 0; }
.btn-star { background: none; border: none; cursor: pointer; font-size: 16px; color: #ccc; padding: 2px 6px; margin-left: 6px; vertical-align: top; }
.btn-star:hover, .btn-star.starred { color: #f0ad4e; }
.fav-panel { background: #fff; border: 1px solid #ddd; border-radius: 4px; padding: 10px 15px; margin-bottom: 10px; display: none; max-height: 350px; overflow-y: auto; }
.fav-panel.active { display: block; }
.fav-item { padding: 8px 0; border-bottom: 1px solid #eee; }
.fav-item:last-child { border-bottom: none; }
.fav-main { display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
.fav-q { flex: 1; cursor: pointer; color: #438eb9; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-right: 10px; }
.fav-q:hover { text-decoration: underline; }
.fav-time { color: #999; font-size: 11px; margin-right: 8px; white-space: nowrap; }
.fav-actions { display: flex; gap: 6px; }
.fav-actions span { cursor: pointer; font-size: 12px; padding: 2px 4px; }
.fav-edit { color: #5bc0de; }
.fav-edit:hover { color: #31b0d5; }
.fav-del { color: #d9534f; }
.fav-del:hover { color: #c9302c; }
.fav-sql-toggle { color: #999; font-size: 11px; cursor: pointer; margin-top: 4px; }
.fav-sql-toggle:hover { color: #666; }
.fav-sql { display: none; background: #f5f5f5; border: 1px solid #ddd; border-radius: 3px; padding: 6px 10px; margin-top: 6px; font-family: monospace; font-size: 11px; color: #333; white-space: pre-wrap; word-break: break-all; max-height: 100px; overflow: auto; }
.fav-sql.show { display: block; }
.fav-edit-input { width: 100%; padding: 4px 8px; border: 1px solid #438eb9; border-radius: 3px; font-size: 13px; margin-right: 8px; }
.fav-edit-btns { display: flex; gap: 4px; }
.fav-edit-btns button { padding: 2px 8px; font-size: 11px; }
.fav-empty { color: #999; text-align: center; padding: 15px; }
.fav-badge { background: #f0ad4e; color: #fff; font-size: 10px; border-radius: 10px; padding: 1px 6px; margin-left: 4px; }
.hist-panel { background: #fff; border: 1px solid #ddd; border-radius: 4px; padding: 10px 15px; margin-bottom: 10px; display: none; max-height: 250px; overflow-y: auto; }
.hist-panel.active { display: block; }
.hist-item { padding: 5px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
.hist-item:last-child { border-bottom: none; }
.hist-q { flex: 1; cursor: pointer; color: #333; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-right: 10px; }
.hist-q:hover { color: #438eb9; text-decoration: underline; }
.hist-empty { color: #999; text-align: center; padding: 15px; }
</style>

<h3 class="header smaller lighter blue">
    <i class="fa fa-robot"></i> AI 数据分析师
    <button class="btn btn-xs btn-default pull-right" id="btn-settings" style="margin-top: 5px;">
        <i class="fa fa-cog"></i> 设置
    </button>
    <button class="btn btn-xs btn-default pull-right" id="btn-favorites" style="margin-top: 5px; margin-right: 5px;">
        <i class="fa fa-star"></i> 收藏<span class="fav-badge" id="fav-count" style="display:none;">0</span>
    </button>
    <button class="btn btn-xs btn-default pull-right" id="btn-history" style="margin-top: 5px; margin-right: 5px;">
        <i class="fa fa-history"></i> 历史
    </button>
</h3>

<!-- 设置面板 -->
<div class="settings-panel" id="settings-panel">
    <div class="form-group">
        <label>API Token:</label>
        <input type="password" id="cfg-token" placeholder="输入火山引擎 API Token" />
    </div>
    <div class="form-group">
        <label>模型名称:</label>
        <input type="text" id="cfg-model" placeholder="如 ep-xxxxx" value="{{ model_name }}" />
    </div>
    <div class="form-group">
        <label>API 地址:</label>
        <input type="text" id="cfg-url" value="https://ark.cn-beijing.volces.com/api/plan/v3/chat/completions" />
    </div>
    <button class="btn btn-sm btn-primary" id="btn-save-config">保存配置</button>
    <button class="btn btn-sm btn-success" id="btn-test-conn" style="margin-left: 5px;">检测连接</button>
    <span id="config-status" style="margin-left: 10px; color: #999;"></span>
</div>

<!-- 收藏面板 -->
<div class="fav-panel" id="fav-panel"></div>
<!-- 历史面板 -->
<div class="hist-panel" id="hist-panel"></div>

<div class="chat-container">
    <!-- 快捷提问 -->
    <div class="quick-tags">
        <button class="btn btn-xs btn-info quick-q" data-q="今日涨停的股票有哪些？">今日涨停</button>
        <button class="btn btn-xs btn-info quick-q" data-q="最近一天KDJ超买（J值>100）的股票TOP10">KDJ超买</button>
        <button class="btn btn-xs btn-info quick-q" data-q="最近一天两市成交额前20的股票">成交额TOP20</button>
        <button class="btn btn-xs btn-info quick-q" data-q="最近一天跌幅超过5%的股票">跌幅榜</button>
        <button class="btn btn-xs btn-info quick-q" data-q="查看最新的尾盘选股报告">最新尾盘报告</button>
        <button class="btn btn-xs btn-warning quick-q" data-q="龙虎榜上榜次数最多的股票">龙虎榜</button>
    </div>

    <!-- 消息区 -->
    <div class="chat-messages" id="chat-messages">
        <div class="msg-row ai">
            <div class="msg-bubble ai-bubble">
                <strong>AI 数据分析师</strong><br>
                你好！我可以通过自然语言帮你查询和分析股票数据。<br>
                例如：「最近涨幅最大的10只股票」「KDJ超买的股票有哪些」<br>
                {% if not has_token %}
                <span style="color: #d9534f;">提示：请先点击右上角"设置"配置 API Token。</span>
                {% end %}
            </div>
        </div>
    </div>

    <!-- 输入区 -->
    <div class="chat-input-bar">
        <input type="text" id="chat-input" placeholder="输入你的问题，如：最近5天涨幅最大的股票..." autocomplete="off" />
        <button class="btn btn-primary" id="btn-send"><i class="fa fa-paper-plane"></i> 发送</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
var MAX_HISTORY = 20;
var chatHistory = [];
var favorites = [];
var historyList = [];

// === 服务端收藏 ===
function loadFavorites(cb) {
    $.get('/stock/ai_agent/favorites', function(data) {
        favorites = data || [];
        renderFavBadge();
        if (cb) cb();
    }, 'json');
}

function addFavorite(question, sql, analysis) {
    $.ajax({
        url: '/stock/ai_agent/favorites',
        type: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({ question: question, sql: sql, analysis: analysis }),
        dataType: 'json',
        success: function() { loadFavorites(); }
    });
}

function removeFavorite(id) {
    $.ajax({
        url: '/stock/ai_agent/favorites',
        type: 'DELETE',
        contentType: 'application/json',
        data: JSON.stringify({ id: id }),
        dataType: 'json',
        success: function() { loadFavorites(function() { renderFavPanel(); }); }
    });
}

function updateFavorite(id, data) {
    $.ajax({
        url: '/stock/ai_agent/favorites',
        type: 'PUT',
        contentType: 'application/json',
        data: JSON.stringify($.extend({ id: id }, data)),
        dataType: 'json',
        success: function(resp) {
            if (resp.success) {
                loadFavorites(function() { renderFavPanel(); });
            }
        }
    });
}

function renderFavBadge() {
    var n = favorites.length;
    $('#fav-count').text(n).toggle(n > 0);
}

function renderFavPanel() {
    var html = '';
    if (favorites.length === 0) {
        html = '<div class="fav-empty">暂无收藏</div>';
    } else {
        for (var i = 0; i < favorites.length; i++) {
            var f = favorites[i];
            var sqlPreview = (f.sql || '').substring(0, 80).replace(/</g, '&lt;').replace(/>/g, '&gt;');
            html += '<div class="fav-item" data-id="' + f.id + '">';
            html += '<div class="fav-main">';
            html += '<span class="fav-q" data-q="' + f.question.replace(/"/g, '&quot;') + '" title="点击重新提问: ' + f.question + '">' + f.question + '</span>';
            html += '<span class="fav-time">' + (f.time || '') + '</span>';
            html += '<div class="fav-actions">';
            html += '<span class="fav-edit" data-id="' + f.id + '" data-title="' + f.question.replace(/"/g, '&quot;') + '" title="编辑标题"><i class="fa fa-pencil"></i></span>';
            html += '<span class="fav-del" data-id="' + f.id + '" title="删除"><i class="fa fa-trash-o"></i></span>';
            html += '</div>';
            html += '</div>';
            if (f.sql) {
                html += '<div class="fav-sql-toggle" data-target="sql-' + f.id + '"><i class="fa fa-code"></i> 查看SQL</div>';
                html += '<div class="fav-sql" id="sql-' + f.id + '">' + (f.sql || '').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</div>';
            }
            html += '<div class="fav-sql-actions" style="margin-top:4px;">';
            html += '<span class="fav-edit-sql" data-id="' + f.id + '" data-sql="' + (f.sql || '').replace(/"/g, '&quot;') + '" title="编辑SQL" style="color:#999;font-size:11px;cursor:pointer;margin-right:10px;"><i class="fa fa-pencil"></i> 编辑SQL</span>';
            if (f.sql) {
                html += '<span class="fav-run-sql" data-q="' + f.question.replace(/"/g, '&quot;') + '" data-sql="' + (f.sql || '').replace(/"/g, '&quot;') + '" title="用此SQL重新查询" style="color:#438eb9;font-size:11px;cursor:pointer;"><i class="fa fa-play"></i> 执行SQL</span>';
            }
            html += '</div>';
            html += '</div>';
        }
    }
    $('#fav-panel').html(html);
}

// === 服务端历史 ===
function loadHistory(cb) {
    $.get('/stock/ai_agent/history', function(data) {
        historyList = data || [];
        if (cb) cb();
    }, 'json');
}

function saveHistory(question, sql, analysis) {
    $.ajax({
        url: '/stock/ai_agent/history',
        type: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({ question: question, sql: sql, analysis: analysis }),
        dataType: 'json'
    });
}

function renderHistPanel() {
    var html = '';
    if (historyList.length === 0) {
        html = '<div class="hist-empty">暂无历史记录</div>';
    } else {
        for (var i = 0; i < historyList.length; i++) {
            var h = historyList[i];
            html += '<div class="hist-item">';
            html += '<span class="hist-q" data-q="' + h.question.replace(/"/g, '&quot;') + '" title="' + h.question + '">' + h.question + '</span>';
            html += '<span class="fav-time">' + (h.time || '') + '</span>';
            html += '</div>';
        }
    }
    $('#hist-panel').html(html);
}

// === 聊天核心 ===
function addMessage(role, html) {
    var cls = role === 'user' ? 'user' : 'ai';
    var bubbleCls = role === 'user' ? 'user-bubble' : 'ai-bubble';
    var row = $('<div class="msg-row ' + cls + '"><div class="msg-bubble ' + bubbleCls + '">' + html + '</div></div>');
    $('#chat-messages').append(row);
    $('#chat-messages').scrollTop($('#chat-messages')[0].scrollHeight);
    return row;
}

function buildTable(columns, rows) {
    if (!columns || !rows || rows.length === 0) return '<p style="color:#999;">无数据</p>';
    var html = '<div class="data-table-wrapper"><table><thead><tr>';
    columns.forEach(function(c) { html += '<th>' + c + '</th>'; });
    html += '</tr></thead><tbody>';
    rows.forEach(function(row) {
        html += '<tr>';
        row.forEach(function(v) { html += '<td>' + (v === null ? '-' : v) + '</td>'; });
        html += '</tr>';
    });
    html += '</tbody></table></div>';
    html += '<small style="color:#999;">共 ' + rows.length + ' 行</small>';
    return html;
}

function renderMarkdown(text) {
    try { if (typeof marked !== 'undefined') return marked.parse(text); } catch(e) {}
    return '<pre>' + text + '</pre>';
}

function trimHistory() {
    if (chatHistory.length > MAX_HISTORY) chatHistory = chatHistory.slice(chatHistory.length - MAX_HISTORY);
}

function sendQuestion(question) {
    if (!question.trim()) return;
    addMessage('user', question);
    var loading = addMessage('ai', '<span class="typing-indicator">正在思考中...</span>');
    chatHistory.push({ role: 'user', content: question });
    trimHistory();

    $.ajax({
        url: '/stock/ai_agent/chat',
        type: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({ message: question, history: chatHistory }),
        dataType: 'json',
        timeout: 120000,
        success: function(resp) {
            var html = '';
            if (resp.error) html += '<div style="color:#d9534f;"><i class="fa fa-exclamation-triangle"></i> ' + resp.error + '</div>';
            if (resp.sql) html += '<div><strong>SQL:</strong><pre>' + resp.sql + '</pre></div>';
            if (resp.columns && resp.rows) html += '<div><strong>查询结果:</strong>' + buildTable(resp.columns, resp.rows) + '</div>';
            if (resp.analysis) html += '<div><strong>分析:</strong><br>' + renderMarkdown(resp.analysis) + '</div>';
            if (!html) html = '<span style="color:#999;">未获得有效结果</span>';

            var starId = 'star-' + Date.now();
            html += '<button class="btn-star" id="' + starId + '" data-q="' + question.replace(/"/g, '&quot;') +
                    '" data-sql="' + (resp.sql || '').replace(/"/g, '&quot;') +
                    '" data-analysis="' + (resp.analysis || '').replace(/"/g, '&quot;') +
                    '" title="收藏此回答"><i class="fa fa-star-o"></i></button>';
            loading.find('.msg-bubble').html(html);

            chatHistory.push({ role: 'assistant', content: question, sql: resp.sql || '', analysis: resp.analysis || '' });
            trimHistory();

            // 保存到服务端历史
            if (!resp.error) saveHistory(question, resp.sql || '', resp.analysis || '');
        },
        error: function(xhr, status, err) {
            var msg = status === 'timeout' ? '请求超时，请稍后重试' : '网络错误: ' + (err || status);
            loading.find('.msg-bubble').html('<div style="color:#d9534f;">' + msg + '</div>');
        }
    });
}

$(function() {
    // 初始化加载
    loadFavorites();
    loadHistory();

    $('#btn-send').click(function() {
        var q = $('#chat-input').val().trim();
        if (q) { sendQuestion(q); $('#chat-input').val(''); }
    });
    $('#chat-input').keypress(function(e) { if (e.which === 13) $('#btn-send').click(); });
    $('.quick-q').click(function() { sendQuestion($(this).data('q')); });

    // 收藏按钮
    $(document).on('click', '.btn-star', function() {
        var btn = $(this);
        addFavorite(btn.data('q'), btn.data('sql'), btn.data('analysis'));
        btn.addClass('starred').find('i').removeClass('fa-star-o').addClass('fa-star');
        btn.prop('disabled', true).attr('title', '已收藏');
    });

    // 收藏面板
    $('#btn-favorites').click(function() {
        var p = $('#fav-panel');
        if (p.hasClass('active')) { p.removeClass('active'); }
        else { renderFavPanel(); p.addClass('active'); $('#hist-panel').removeClass('active'); }
    });
    $(document).on('click', '.fav-q', function() {
        $('#fav-panel').removeClass('active');
        sendQuestion($(this).data('q'));
    });
    $(document).on('click', '.fav-del', function(e) {
        e.stopPropagation();
        removeFavorite($(this).data('id'));
    });

    // 收藏编辑标题
    $(document).on('click', '.fav-edit', function(e) {
        e.stopPropagation();
        var id = $(this).data('id');
        var currentTitle = $(this).data('title');
        var item = $(this).closest('.fav-item');
        var mainRow = item.find('.fav-main');
        mainRow.html(
            '<input type="text" class="fav-edit-input" value="' + currentTitle.replace(/"/g, '&quot;') + '" />' +
            '<div class="fav-edit-btns">' +
            '<button class="btn btn-xs btn-primary fav-save-edit" data-id="' + id + '">保存</button>' +
            '<button class="btn btn-xs btn-default fav-cancel-edit">取消</button>' +
            '</div>'
        );
        mainRow.find('.fav-edit-input').focus().select();
    });

    $(document).on('click', '.fav-save-edit', function(e) {
        e.stopPropagation();
        var id = $(this).data('id');
        var newTitle = $(this).closest('.fav-main').find('.fav-edit-input').val().trim();
        if (newTitle) {
            updateFavorite(id, { title: newTitle });
        }
    });

    $(document).on('click', '.fav-cancel-edit', function(e) {
        e.stopPropagation();
        renderFavPanel();
    });

    $(document).on('keypress', '.fav-edit-input', function(e) {
        if (e.which === 13) {
            $(this).closest('.fav-main').find('.fav-save-edit').click();
        }
    });

    // 收藏 SQL 展开/收起
    $(document).on('click', '.fav-sql-toggle', function(e) {
        e.stopPropagation();
        var target = $(this).data('target');
        $('#' + target).toggleClass('show');
        $(this).find('i').toggleClass('fa-code fa-eye');
    });

    // 编辑 SQL
    $(document).on('click', '.fav-edit-sql', function(e) {
        e.stopPropagation();
        var id = $(this).data('id');
        var currentSql = $(this).data('sql');
        var item = $(this).closest('.fav-item');
        var actionsDiv = $(this).closest('.fav-sql-actions');
        actionsDiv.html(
            '<textarea class="fav-sql-input" style="width:100%;height:80px;padding:4px 8px;border:1px solid #438eb9;border-radius:3px;font-family:monospace;font-size:11px;resize:vertical;">' +
            currentSql.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</textarea>' +
            '<div style="margin-top:4px;">' +
            '<button class="btn btn-xs btn-primary fav-save-sql" data-id="' + id + '">保存</button> ' +
            '<button class="btn btn-xs btn-default fav-cancel-sql-edit">取消</button>' +
            '</div>'
        );
        actionsDiv.find('.fav-sql-input').focus();
    });

    $(document).on('click', '.fav-save-sql', function(e) {
        e.stopPropagation();
        var id = $(this).data('id');
        var newSql = $(this).closest('.fav-sql-actions').find('.fav-sql-input').val().trim();
        updateFavorite(id, { sql: newSql });
    });

    $(document).on('click', '.fav-cancel-sql-edit', function(e) {
        e.stopPropagation();
        renderFavPanel();
    });

    // 执行收藏中的 SQL
    $(document).on('click', '.fav-run-sql', function(e) {
        e.stopPropagation();
        var question = $(this).data('q');
        var sql = $(this).data('sql');
        $('#fav-panel').removeClass('active');
        addMessage('user', '[执行SQL] ' + question);
        var loading = addMessage('ai', '<span class="typing-indicator">正在执行...</span>');
        $.ajax({
            url: '/stock/ai_agent/chat',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({ message: question, history: [], direct_sql: sql }),
            dataType: 'json',
            timeout: 120000,
            success: function(resp) {
                var html = '';
                if (resp.sql) html += '<div><strong>SQL:</strong><pre>' + resp.sql + '</pre></div>';
                if (resp.columns && resp.rows) html += '<div><strong>查询结果:</strong>' + buildTable(resp.columns, resp.rows) + '</div>';
                if (resp.analysis) html += '<div><strong>分析:</strong><br>' + renderMarkdown(resp.analysis) + '</div>';
                if (resp.error) html += '<div style="color:#d9534f;">' + resp.error + '</div>';
                if (!html) html = '<span style="color:#999;">无结果</span>';
                loading.find('.msg-bubble').html(html);
            },
            error: function(xhr, status, err) {
                loading.find('.msg-bubble').html('<div style="color:#d9534f;">执行失败: ' + (err || status) + '</div>');
            }
        });
    });

    // 历史面板
    $('#btn-history').click(function() {
        var p = $('#hist-panel');
        if (p.hasClass('active')) { p.removeClass('active'); }
        else { loadHistory(function() { renderHistPanel(); }); p.addClass('active'); $('#fav-panel').removeClass('active'); }
    });
    $(document).on('click', '.hist-q', function() {
        $('#hist-panel').removeClass('active');
        sendQuestion($(this).data('q'));
    });

    // 设置
    $('#btn-settings').click(function() { $('#settings-panel').toggleClass('active'); });
    $('#btn-save-config').click(function() {
        var data = { api_token: $('#cfg-token').val().trim(), model_name: $('#cfg-model').val().trim(), api_url: $('#cfg-url').val().trim() };
        if (!data.model_name) { $('#config-status').text('模型名称不能为空').css('color', '#d9534f'); return; }
        $.ajax({
            url: '/stock/ai_agent/config', type: 'POST', contentType: 'application/json',
            data: JSON.stringify(data), dataType: 'json',
            success: function(resp) {
                $('#config-status').text(resp.success ? '保存成功' : resp.message).css('color', resp.success ? '#5cb85c' : '#d9534f');
                if (resp.success) $('#cfg-token').val('');
            },
            error: function() { $('#config-status').text('保存失败').css('color', '#d9534f'); }
        });
    });
    $('#btn-test-conn').click(function() {
        var btn = $(this);
        btn.prop('disabled', true).text('检测中...');
        $('#config-status').text('正在检测...').css('color', '#999');
        $.ajax({
            url: '/stock/ai_agent/test', type: 'POST', dataType: 'json', timeout: 65000,
            success: function(resp) {
                $('#config-status').text(resp.message).css('color', resp.success ? '#5cb85c' : '#d9534f');
            },
            error: function(xhr, status, err) {
                $('#config-status').text('检测请求失败: ' + (err || status)).css('color', '#d9534f');
            },
            complete: function() { btn.prop('disabled', false).text('检测连接'); }
        });
    });
});
</script>
{% end %}
